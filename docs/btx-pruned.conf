# BTX Wallet Phase 0 starter configuration.
# Copy this to the BTX data directory as btx.conf before first run.
#
# Data directory:
# - Linux:  ~/.btx/
# - macOS:  ~/Library/Application Support/BTX/
# - Windows: %APPDATA%\BTX\

# Keep first sync practical on a normal gaming PC.
# 4096 MiB keeps recent block data while pruning old block files.
prune=4096
pruneduringinit=4096
dbcache=2048
maxmempool=300

# Keep shielded wallet restarts and assumeutxo recovery fast.
retainshieldedcommitmentindex=1

# Preserve privacy and air-gap posture: no telemetry, no external services.
server=0
listen=1
dnsseed=1
fixedseeds=1

# GUI users can still override these in btx.conf or command-line flags.
