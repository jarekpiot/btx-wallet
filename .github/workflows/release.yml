name: Phase 0 QT Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build"
        required: true
        default: "v0.1.0-qt"
  push:
    tags:
      - "v*-qt"

permissions:
  contents: write

env:
  BTX_CORE_REF: v0.29.7
  BTX_CORE_COMMIT: 2d983afab1338762b43d2614cb1104ac8a1520ec
  BTX_ARTIFACT_VERSION: ${{ github.event.inputs.release_tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.artifact_os }} ${{ matrix.artifact_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_os: linux
            artifact_arch: x86_64
            runner: ubuntu-24.04
            depends_host: x86_64-pc-linux-gnu
            apt_packages: build-essential cmake curl make patch bison g++ pkgconf python3 xz-utils librsvg2-bin imagemagick
          - artifact_os: windows
            artifact_arch: x86_64
            runner: ubuntu-24.04
            depends_host: x86_64-w64-mingw32
            apt_packages: build-essential cmake curl make patch bison g++ pkgconf python3 xz-utils librsvg2-bin imagemagick nsis g++-mingw-w64-x86-64-posix
          - artifact_os: macos
            artifact_arch: arm64
            runner: macos-14
            depends_host: arm64-apple-darwin
            brew_packages: cmake pkgconf gnu-getopt coreutils librsvg imagemagick

    steps:
      - name: Checkout wallet repo
        uses: actions/checkout@v4

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ${{ matrix.brew_packages }}

      - name: Build deterministic artifact pass 1
        env:
          BTX_TARGET_OS: ${{ matrix.artifact_os }}
          BTX_TARGET_ARCH: ${{ matrix.artifact_arch }}
          BTX_DEPENDS_HOST: ${{ matrix.depends_host }}
          BTX_USE_DEPENDS: "1"
          BTX_BUILD_DEPLOY: "1"
          BTX_ARTIFACT_DIR: artifacts-pass1
          BTX_WORK_DIR: .work-pass1
        run: |
          rm -rf .work-pass1 .work-pass2 artifacts-pass1 artifacts-pass2 artifacts
          bash scripts/build-qt-wallet.sh

      - name: Build deterministic artifact pass 2
        env:
          BTX_TARGET_OS: ${{ matrix.artifact_os }}
          BTX_TARGET_ARCH: ${{ matrix.artifact_arch }}
          BTX_DEPENDS_HOST: ${{ matrix.depends_host }}
          BTX_USE_DEPENDS: "1"
          BTX_BUILD_DEPLOY: "1"
          BTX_ARTIFACT_DIR: artifacts-pass2
          BTX_WORK_DIR: .work-pass2
        run: bash scripts/build-qt-wallet.sh

      - name: Compare reproducible artifact hashes
        run: |
          mkdir -p artifacts
          proof="artifacts/reproducibility-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}.txt"
          artifact_name="btx-wallet-${BTX_ARTIFACT_VERSION}-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}"
          if [ "${{ matrix.artifact_os }}" = "windows" ]; then
            suffix=".zip"
          else
            suffix=".tar.gz"
          fi
          first="artifacts-pass1/${artifact_name}${suffix}"
          second="artifacts-pass2/${artifact_name}${suffix}"
          test -f "$first"
          test -f "$second"
          first_hash="$(sha256sum "$first" | cut -d ' ' -f 1)"
          second_hash="$(sha256sum "$second" | cut -d ' ' -f 1)"
          {
            echo "Artifact: ${artifact_name}${suffix}"
            echo "Runner: ${{ runner.os }} / ${{ matrix.runner }}"
            echo "Depends host: ${{ matrix.depends_host }}"
            echo "BTX core ref: ${BTX_CORE_REF}"
            echo "BTX core commit: ${BTX_CORE_COMMIT}"
            echo "Pass 1 SHA256: ${first_hash}"
            echo "Pass 2 SHA256: ${second_hash}"
          } > "$proof"
          test "$first_hash" = "$second_hash"
          cp artifacts-pass2/* artifacts/

      - name: Verify wallet repo adds no crypto implementation
        run: bash scripts/verify-no-new-crypto.sh

      - name: Upload unsigned artifact
        uses: actions/upload-artifact@v4
        with:
          name: btx-wallet-${{ env.BTX_ARTIFACT_VERSION }}-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: |
            artifacts/*
          if-no-files-found: error

  sign-and-release:
    name: Sign and publish release
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout wallet repo
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p artifacts
          find downloaded-artifacts -maxdepth 3 -type f -print -exec cp {} artifacts/ \;

      - name: Import release GPG key
        env:
          BTX_RELEASE_GPG_PRIVATE_KEY: ${{ secrets.BTX_RELEASE_GPG_PRIVATE_KEY }}
        run: |
          test -n "$BTX_RELEASE_GPG_PRIVATE_KEY"
          printf '%s' "$BTX_RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Configure GPG passphrase
        env:
          BTX_RELEASE_GPG_PASSPHRASE: ${{ secrets.BTX_RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -n "$BTX_RELEASE_GPG_PASSPHRASE" ]; then
            mkdir -p ~/.gnupg
            chmod 700 ~/.gnupg
            printf 'allow-loopback-pinentry\n' >> ~/.gnupg/gpg-agent.conf
            gpgconf --kill gpg-agent
            printf '%s' "$BTX_RELEASE_GPG_PASSPHRASE" > ~/.gnupg/passphrase
            chmod 600 ~/.gnupg/passphrase
          fi

      - name: Sign artifacts
        env:
          BTX_GPG_KEY_ID: ${{ secrets.BTX_RELEASE_GPG_KEY_ID }}
          BTX_RELEASE_GPG_PASSPHRASE: ${{ secrets.BTX_RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -n "$BTX_RELEASE_GPG_PASSPHRASE" ]; then
            BTX_GPG_PASSPHRASE_FILE="$HOME/.gnupg/passphrase" bash scripts/sign-release-artifacts.sh artifacts
          else
            bash scripts/sign-release-artifacts.sh artifacts
          fi

      - name: Verify signatures and sums
        run: bash scripts/verify-release-artifacts.sh artifacts

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" --title "BTX Wallet $RELEASE_TAG" --notes-file RELEASE-CHECKLIST.md
          gh release upload "$RELEASE_TAG" artifacts/* --clobber
